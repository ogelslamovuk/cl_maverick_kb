site_name: База знаний Maverick
site_description: База знаний Maverick — инструкции, сценарии и справка для сотрудников CinemaLab
site_url: https://ogelslamovuk.github.io/cl_maverick_kb/

copyright: © CinemaLab · Maverick Knowledge Base

extra:
  generator: false

theme:
  name: material
  language: ru
  logo: assets/brand/maverick_logo.png
  favicon: assets/brand/cinemalab_logo.jpg
  palette:
    - scheme: default
      primary: white
      accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - toc
  - tables
  - fenced_code
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/search-fallback.js

nav:
  - Главная: index.md
  - Как пользоваться базой: Как пользоваться базой знаний.md
